services:
  # ============ MEDIA SERVER ============
  plex:
    container_name: plex
    image: linuxserver/plex
    network_mode: "host"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ${USERDIR}/plex/config:/config
      - ${USERDIR}/plex/media:/media
    restart: unless-stopped

  # ============ MONITORING ============
  tautulli:
    container_name: tautulli
    image: tautulli/tautulli
    networks:
      - monitoring_network
    depends_on:
      - plex
    ports:
      - "8181:8181"
    environment:
      - TZ=${TZ}
    volumes:
      - ${USERDIR}/tautulli:/config
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: grafana/grafana
    networks:
      - monitoring_network
    depends_on:
      - telegraf
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - TZ=${TZ}
    volumes:
      - ${USERDIR}/grafana:/var/lib/grafana
    restart: unless-stopped

  telegraf:
    container_name: telegraf
    image: telegraf:latest
    networks:
      - monitoring_network
    environment:
      - TZ=${TZ}
    volumes:
      - ${USERDIR}/telegraf:/etc/telegraf
    restart: unless-stopped

  watchtower:
    container_name: watchtower
    image: containrrr/watchtower:latest
    networks:
      - monitoring_network
    environment:
      - TZ=${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # ============ MEDIA MANAGEMENT ============
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    volumes:
      - ${USERDIR}/docker/seerr/config:/app/config
    ports:
      - "5055:5055"
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    networks:
      - media_network
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3

  # ============ MEDIA CENTER ============
  watchlistarr:
    container_name: watchlistarr
    image: watchlistarr/watchlistarr
    networks:
      - download_network
    environment:
      - TZ=${TZ}
    volumes:
      - ${USERDIR}/watchlistarr:/config
    restart: unless-stopped

  # ============ DOWNLOADING ============
  transmission:
    container_name: transmission
    image: linuxserver/transmission
    environment:
      - TRANSMISSION_RPC_HOST_WHITELIST=192.168.86.*
      - TZ=${TZ}
    networks:
      - download_network
    ports:
      - "9091:9091"
    volumes:
      - ${USERDIR}/transmission/config:/config
    restart: unless-stopped

  # ============ ERROR MONITORING ============
  cleanarr:
    container_name: cleanarr
    image: cleanarr/cleanarr
    networks:
      - download_network
    environment:
      - TZ=${TZ}
    volumes:
      - ${USERDIR}/cleanarr:/config
    restart: unless-stopped

  requestrr:
    container_name: requestrr
    image: requestrr/requestrr
    networks:
      - download_network
    ports:
      - "4545:4545"
    environment:
      - TZ=${TZ}
    volumes:
      - ${USERDIR}/requestrr:/config
    restart: unless-stopped

  # ============ STREAM TRACKING ============
  tracearr:
    image: ghcr.io/connorgallopo/tracearr:latest
    container_name: tracearr
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - TZ=${TZ}
      - DATABASE_URL=postgres://tracearr:${DB_PASSWORD:?DB_PASSWORD must be set}@timescale:5432/tracearr
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - COOKIE_SECRET=${COOKIE_SECRET:?COOKIE_SECRET must be set}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3001}
      - LOG_LEVEL=info
    depends_on:
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tracearr-network

  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: tracearr-timescale
    shm_size: 512mb
    environment:
      - POSTGRES_USER=tracearr
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - POSTGRES_DB=tracearr
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracearr"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tracearr-network

  redis:
    image: redis:8-alpine
    container_name: tracearr-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tracearr-network

networks:
  monitoring_network:
  media_network:
  download_network:
  tracearr-network:
    driver: bridge

volumes:
  plex:
  tautulli:
  grafana:
  telegraf:
  watchlistarr:
  cleanarr:
  requestrr:
  transmission:
  timescale_data:
  redis_data:
